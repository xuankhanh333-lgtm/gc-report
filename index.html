<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GC1! Forecast Reports</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#faf9f5;color:#1a1a18;display:flex;flex-direction:column;height:100vh}
  header{padding:12px 18px;border-bottom:1px solid #e7e5dd;background:#fff;flex:0 0 auto}
  .row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  h1{font-size:17px;font-weight:600;margin:0}
  .sub{color:#6b6a64;font-size:12px;margin-left:auto}
  .tabs{display:flex;gap:8px;margin-top:10px;align-items:center;flex-wrap:wrap}
  .tab{appearance:none;border:1px solid #d9d7cf;background:#f4f2ec;color:#3a3933;font-size:13px;font-weight:600;padding:7px 16px;border-radius:8px;cursor:pointer}
  .tab:hover{background:#ece9e1}
  .tab.active{background:#BA7517;border-color:#BA7517;color:#fff}
  .tab.sub{font-size:12px;padding:4px 12px;border-radius:6px}
  .refresh{appearance:none;border:1px solid #BA7517;background:#fff;color:#BA7517;font-size:13px;font-weight:600;padding:7px 14px;border-radius:8px;cursor:pointer;margin-left:auto}
  .refresh:hover{background:#fbf3e7}
  .cds{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;align-items:center}
  .cd-chip{display:flex;align-items:center;gap:6px;font-size:12px;color:#6b6a64;border:1px solid #ece9e1;background:#faf8f3;padding:6px 10px;border-radius:8px}
  .cd-chip b{font-variant-numeric:tabular-nums;color:#BA7517;font-weight:700;text-align:right}
  .cd-chip.m b{color:#1f7a4d}
  .cd-chip.soon b{color:#c0392b}
  .frame{flex:1 1 auto;border:0;width:100%;background:#faf9f5}
  .hint{font-size:11px;color:#9b9a93;padding:6px 18px;background:#fff;border-top:1px solid #f0eee7;flex:0 0 auto}
</style>
</head>
<body>
  <header>
    <div class="row">
      <h1>GC1! Forecast Reports</h1>
      <span class="sub">RT ~15 phút &middot; H4 ~1 giờ &middot; ICT-ML ~1 giờ &middot; Pooldir ~H4 &middot; VN EOD</span>
    </div>
    <div class="tabs">
      <button class="tab active" id="btn-vn" onclick="show('vn')">Vnpool</button>
      <button class="tab" id="btn-pool" onclick="show('pool')">Pooldir</button>
      <button class="tab" id="btn-rt" onclick="show('rt')">RT &middot; M15</button>
      <button class="tab" id="btn-h4" onclick="show('h4')">H4-closed</button>
      <button class="tab" id="btn-ict" onclick="show('ict')">ICT-ML</button>
      <button class="refresh" id="btn-refresh" onclick="refreshNow()">&#x21bb; Làm mới</button>
    </div>
    <div class="tabs" id="pool-subtabs" style="display:none">
      <button class="tab sub" id="btn-pool-dash" onclick="show('pool')">Dashboard</button>
      <button class="tab sub" id="btn-pool-3p" onclick="show('3p')">3P Trend</button>
      <button class="tab sub" id="btn-pool-sc" onclick="show('sc')">Scorecard</button>
    </div>
    <div class="tabs" id="vn-subtabs" style="display:none">
      <button class="tab sub" id="btn-vn-dash" onclick="show('vn')">Dashboard</button>
      <button class="tab sub" id="btn-vn-sc" onclick="show('vsc')">Scorecard</button>
    </div>
    <div class="cds">
      <span class="cd-chip m" id="chip-m15" title="Thời gian tới khi nến M15 đóng (mốc :00/:15/:30/:45)">Nến M15 đóng sau <b id="cd-m15">--:--</b></span>
      <span class="cd-chip m" id="chip-h4" title="Thời gian tới khi nến H4 đóng (UTC 02/06/10/14/18/22h = GMT+7 01/05/09/13/17/21h)">Nến H4 đóng sau <b id="cd-h4">-:--:--</b></span>
      <span class="cd-chip" id="cdchip" title="Thời gian tới lần trang tự làm mới">Trang reload sau <b id="cd">--:--</b></span>
    </div>
  </header>
  <iframe class="frame" id="frame" src="about:blank" title="report"></iframe>
  <div class="hint" id="hint">Đang tải…</div>
  <script>
    var cur = 'vn', timer = null, refreshMs = 300000, nextAt = 0, started = false, lastLoadAt = 0;
    function p2(n){ return (n < 10 ? '0' : '') + n; }
    function fmtTime(){
      var d = new Date();
      return p2(d.getHours()) + ':' + p2(d.getMinutes()) + ':' + p2(d.getSeconds());
    }
    function fmtMS(s){ return p2(Math.floor(s / 60)) + ':' + p2(s % 60); }
    function fmtHMS(s){ return Math.floor(s / 3600) + ':' + p2(Math.floor((s % 3600) / 60)) + ':' + p2(s % 60); }
    // M15 dong o moc :00/:15/:30/:45 (theo UTC, GMT+7 dung chung moc)
    function remM15(now){ var s = now.getUTCMinutes() * 60 + now.getUTCSeconds(); return 900 - (s % 900); }
    // H4 dong o UTC 02/06/10/14/18/22h (gio % 4 == 2)
    function remH4(now){
      var s = now.getUTCHours() * 3600 + now.getUTCMinutes() * 60 + now.getUTCSeconds();
      var sh = (((s - 7200) % 86400) + 86400) % 86400;
      return 14400 - (sh % 14400);
    }
    function setChip(idv, idc, txt, soon){
      var e = document.getElementById(idv); if (e) e.textContent = txt;
      var c = document.getElementById(idc); if (c) c.classList.toggle('soon', soon);
    }
    function tick(){
      var rem = Math.max(0, Math.round((nextAt - Date.now()) / 1000));
      setChip('cd', 'cdchip', fmtMS(rem), rem <= 30);
      var now = new Date();
      var m = remM15(now); setChip('cd-m15', 'chip-m15', fmtMS(m), m <= 30);
      var h = remH4(now); setChip('cd-h4', 'chip-h4', fmtHMS(h), h <= 60);
    }
    function load(k, isAuto){
      cur = k;
      var base = (k === 'h4') ? 'h4.html' : (k === 'ict') ? 'ictml.html' : (k === 'pool') ? 'pooldir.html' : (k === '3p') ? 'pooldir-trend.html' : (k === 'sc') ? 'pooldir-scorecard.html' : (k === 'vn') ? 'vnpool.html' : (k === 'vsc') ? 'vnpool-scorecard.html' : 'rt.html';
      document.getElementById('frame').src = base + '?embed=1&t=' + Date.now();
      lastLoadAt = Date.now();
      document.getElementById('btn-rt').classList.toggle('active', k === 'rt');
      document.getElementById('btn-h4').classList.toggle('active', k === 'h4');
      document.getElementById('btn-ict').classList.toggle('active', k === 'ict');
      var poolGrp = (k === 'pool' || k === '3p' || k === 'sc');
      document.getElementById('btn-pool').classList.toggle('active', poolGrp);
      document.getElementById('pool-subtabs').style.display = poolGrp ? 'flex' : 'none';
      document.getElementById('btn-pool-dash').classList.toggle('active', k === 'pool');
      document.getElementById('btn-pool-3p').classList.toggle('active', k === '3p');
      document.getElementById('btn-pool-sc').classList.toggle('active', k === 'sc');
      var vnGrp = (k === 'vn' || k === 'vsc');
      document.getElementById('btn-vn').classList.toggle('active', vnGrp);
      document.getElementById('vn-subtabs').style.display = vnGrp ? 'flex' : 'none';
      document.getElementById('btn-vn-dash').classList.toggle('active', k === 'vn');
      document.getElementById('btn-vn-sc').classList.toggle('active', k === 'vsc');
      // M15/H4 close chips chi hop le cho RT/H4 (GC). ICT-ML theo H1; VN theo phien HOSE.
      var gc = (k !== 'ict' && k !== 'vn' && k !== 'vsc');
      var cm = document.getElementById('chip-m15'); if (cm) cm.style.display = gc ? 'flex' : 'none';
      var ch = document.getElementById('chip-h4');  if (ch) ch.style.display = gc ? 'flex' : 'none';
      refreshMs = (k === 'h4' || k === 'pool' || k === '3p' || k === 'sc' || k === 'vn' || k === 'vsc') ? 900000 : 300000;
      nextAt = Date.now() + refreshMs;
      var mins = (k === 'h4' || k === 'pool' || k === '3p' || k === 'sc' || k === 'vn' || k === 'vsc') ? '15' : '5';
      var labl = (k === 'h4') ? 'H4-closed' : (k === 'ict') ? 'ICT-ML (4 model)' : (k === 'pool') ? 'Pooldir · Dashboard (3 model)' : (k === '3p') ? 'Pooldir · 3P Trend · 15 ngày' : (k === 'sc') ? 'Pooldir · Forward Scorecard' : (k === 'vn') ? 'Vnpool · Dashboard (quét EOD)' : (k === 'vsc') ? 'Vnpool · Forward Scorecard' : 'RT · M15';
      document.getElementById('hint').textContent =
        'Đang xem: ' + labl + ' · trang tự làm mới mỗi ' + mins + ' phút · lần cuối ' + fmtTime();
      tick();
      if (!started){ setInterval(tick, 1000); started = true; }
      if (!isAuto) schedule();
    }
    function schedule(){
      if (timer) clearInterval(timer);
      timer = setInterval(function(){ load(cur, true); }, refreshMs);
    }
    function show(k){ load(k, false); }
    function refreshNow(){ load(cur, false); }
    // Mobile: trinh duyet dung timer khi tab o nen / khoa man hinh.
    // Khi quay lai tab: (1) tick() ngay de dong bo lai dem nguoc (khong de hien gia tri dong cu),
    // (2) chi reload iframe khi da QUA TRON 1 chu ky (tranh tai lai trang nang moi lan cham).
    function refreshIfStale(){
      if ((Date.now() - lastLoadAt) >= refreshMs) load(cur, false);
    }
    function onReturn(){ tick(); refreshIfStale(); }
    document.addEventListener('visibilitychange', function(){
      if (document.visibilityState === 'visible') onReturn();
    });
    window.addEventListener('pageshow', function(e){
      if (e && e.persisted) onReturn();   // khoi phuc tu bfcache
    });
    load('vn', false);
  </script>
</body>
</html>
