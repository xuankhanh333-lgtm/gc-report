<div id="fredbias" style="display:none;font-size:12px;color:var(--text-secondary);margin:0 0 10px;line-height:1.7;font-variant-numeric:tabular-nums" title="Bias vĩ mô từ FRED scorecard (điểm = Σ dir×sign) · RY = lợi suất thực 10Y DFII10 · Carry = DFF−ECBDFR · mũi tên Δ3 tháng tô theo tác động lên VÀNG (▲ đỏ = cản vàng)"></div>
<script>
/* Chip FRED bias — đọc fred-history.jsonl CÙNG ORIGIN trên gc-report Pages, decouple hoàn toàn
   với pipeline pooldir (không đụng Python). Fail (file://, 404, parse) → chip ẩn im lặng.
   ry/carry chỉ hiện khi record có field (scorecard.mjs ≥ 17/07/2026). */
(function () {
  if (location.protocol === 'file:') return;
  fetch('fred-history.jsonl', { cache: 'no-store' }).then(function (r) {
    if (!r.ok) throw 0; return r.text();
  }).then(function (tx) {
    var L = tx.trim().split('\n'), h = null;
    for (var i = L.length - 1; i >= 0 && !h; i--) { try { h = JSON.parse(L[i]); } catch (e) {} }
    if (!h || typeof h.gold !== 'number') return;
    function sc(v, n) {
      var c = v > 0 ? 'var(--text-success)' : v < 0 ? 'var(--text-danger)' : 'var(--text-muted)';
      return '<b style="color:' + c + '">' + (v > 0 ? '+' : '') + v + '</b><span style="color:var(--text-muted)">/' + n + '</span>';
    }
    function dz(d) {
      if (d == null) return '';
      var up = d > 0.05, dn = d < -0.05;
      var c = up ? 'var(--text-danger)' : dn ? 'var(--text-success)' : 'var(--text-muted)';
      return ' <span style="color:' + c + '">' + (up ? '▲' : dn ? '▼' : '→') + (d > 0 ? '+' : '') + d.toFixed(2) + '/3m</span>';
    }
    var t = new Date(h.t), pad = function (x) { return (x < 10 ? '0' : '') + x; };
    var parts = ['🏦 <a href="fred.html" style="color:var(--text-accent);text-decoration:none">FRED</a>',
      'GOLD ' + sc(h.gold, h.goldN), 'USD ' + sc(h.usd, h.usdN)];
    if (h.ry) parts.push('RY10Y ' + h.ry.v.toFixed(2) + dz(h.ry.d3m));
    if (h.carry) parts.push('Carry ' + h.carry.v.toFixed(2) + dz(h.carry.d3m));
    parts.push('<span style="color:var(--text-muted)">' + pad(t.getHours()) + ':' + pad(t.getMinutes()) + ' ' + pad(t.getDate()) + '/' + pad(t.getMonth() + 1) + '</span>');
    // Overlay TREND gold+usd bias (chuẩn hoá bias×150/N như fred.html) — dùng lại chính data vừa fetch.
    function biasTrend(lines) {
      var R = [];
      for (var k = 0; k < lines.length; k++) { try { var o = JSON.parse(lines[k]); if (typeof o.gold === 'number' && typeof o.usd === 'number' && o.goldN && o.usdN && o.t) R.push(o); } catch (e) {} }
      if (R.length < 2) return null;
      var H = 46, mid = 22, pad = 3, n = R.length;
      var g = R.map(function (o) { return o.gold * 150 / o.goldN; }), u = R.map(function (o) { return o.usd * 150 / o.usdN; });
      var dom = Math.max(40, Math.max.apply(null, g.concat(u).map(Math.abs)));
      var scl = (mid - pad) / dom;
      var xv = function (i) { return n === 1 ? 97 : 3 + i * 94 / (n - 1); };
      var yv = function (v) { return +(mid - v * scl).toFixed(1); };
      var seg = function (arr, col) {
        var p = arr.map(function (v, i) { return xv(i).toFixed(1) + ',' + yv(v); }).join(' ');
        return '<polyline points="' + p + '" fill="none" stroke="' + col + '" stroke-width="1.5" vector-effect="non-scaling-stroke"/>' +
          '<circle cx="' + xv(n - 1).toFixed(1) + '" cy="' + yv(arr[n - 1]) + '" r="2.2" fill="' + col + '"/>';
      };
      var GOLD = '#d4a642', USD = '#4884dc', gl = '', prev = null, days = [];
      for (var j = 0; j < n; j++) { var dd = new Date(R[j].t), dk = dd.getFullYear() + '-' + dd.getMonth() + '-' + dd.getDate(); if (dk !== prev) { if (prev !== null) { var x = xv(j).toFixed(1); gl += '<line x1="' + x + '" y1="2" x2="' + x + '" y2="' + (H - 2) + '" stroke="var(--text-muted)" stroke-opacity=".16" vector-effect="non-scaling-stroke"/>'; } days.push({ x: xv(j), lab: dd.getDate() + '/' + (dd.getMonth() + 1) }); prev = dk; } }
      // trục thời gian dưới chart: nhãn ngày, chống chồng (cách ≥12%, luôn giữ ngày cuối)
      var ticks = [], lastX = -99;
      for (var m = 0; m < days.length; m++) { if (days[m].x - lastX >= 12) { ticks.push(days[m]); lastX = days[m].x; } }
      if (ticks.length && ticks[ticks.length - 1].lab !== days[days.length - 1].lab) { if (days[days.length - 1].x - ticks[ticks.length - 1].x < 12) ticks.pop(); ticks.push(days[days.length - 1]); }
      var axis = ticks.map(function (d) { return '<span style="position:absolute;left:' + Math.max(3, Math.min(97, d.x)).toFixed(1) + '%;transform:translateX(-50%)">' + d.lab + '</span>'; }).join('');
      var html = '<div style="margin-top:7px">' +
        '<svg data-trend="1" viewBox="0 0 100 ' + H + '" preserveAspectRatio="none" style="width:100%;height:42px;display:block;cursor:crosshair">' +
        '<rect x="0" y="0" width="100" height="' + H + '" fill="none" pointer-events="all"/>' +
        '<line x1="0" y1="' + mid + '" x2="100" y2="' + mid + '" stroke="var(--text-muted)" stroke-opacity=".35" stroke-dasharray="3 3" vector-effect="non-scaling-stroke"/>' +
        gl + seg(g, GOLD) + seg(u, USD) + '</svg>' +
        '<div style="position:relative;height:12px;font-size:9px;color:var(--text-muted);line-height:12px;margin-top:1px">' + axis + '</div>' +
        '<div style="font-size:10px;color:var(--text-muted);margin-top:1px"><b style="color:' + GOLD + '">— GOLD</b> · <b style="color:' + USD + '">— USD</b> · bias %/N · ' + n + ' lần · rê chuột xem từng lần</div></div>';
      return { html: html, R: R, g: g, u: u, n: n, mid: mid, scl: scl };
    }
    // Tooltip hover trên trend — đọc thời gian + bias raw/N + % chuẩn hoá tại điểm gần con trỏ (crosshair + 2 dot).
    function hookHover(box, TR) {
      var sv = box.querySelector('svg[data-trend]'); if (!sv) return;
      var tip = document.getElementById('fredTrendTip');
      if (!tip) { tip = document.createElement('div'); tip.id = 'fredTrendTip'; tip.style.cssText = 'display:none;position:fixed;z-index:99;pointer-events:none;padding:6px 9px;border-radius:8px;font-size:11px;line-height:1.5;background:var(--surface-2);color:var(--text-primary);border:1px solid var(--border-strong);box-shadow:0 8px 22px rgba(0,0,0,.28);white-space:nowrap;font-variant-numeric:tabular-nums'; document.body.appendChild(tip); }
      var NS = 'http://www.w3.org/2000/svg', cross = null, dg = null, du = null, p2 = function (x) { return (x < 10 ? '0' : '') + x; };
      function mk(tag, at) { var e = document.createElementNS(NS, tag); for (var a in at) e.setAttribute(a, at[a]); sv.appendChild(e); return e; }
      sv.addEventListener('mousemove', function (e) {
        var r = sv.getBoundingClientRect(), n = TR.n;
        var i = Math.max(0, Math.min(n - 1, Math.round((e.clientX - r.left) / r.width * (n - 1))));
        var o = TR.R[i], gp = TR.g[i], up = TR.u[i], d = new Date(o.t);
        tip.innerHTML = '<b>' + p2(d.getDate()) + '/' + (d.getMonth() + 1) + ' ' + p2(d.getHours()) + ':' + p2(d.getMinutes()) + '</b><br>' +
          '<span style="color:#d4a642">GOLD ' + (o.gold >= 0 ? '+' : '') + o.gold + '/' + o.goldN + ' · ' + (gp >= 0 ? '+' : '') + Math.round(gp) + '%</span><br>' +
          '<span style="color:#4884dc">USD ' + (o.usd >= 0 ? '+' : '') + o.usd + '/' + o.usdN + ' · ' + (up >= 0 ? '+' : '') + Math.round(up) + '%</span>';
        tip.style.display = 'block'; tip.style.left = (e.clientX + 13) + 'px'; tip.style.top = (e.clientY + 13) + 'px';
        var x = n === 1 ? 97 : 3 + i * 94 / (n - 1), yg = +(TR.mid - gp * TR.scl).toFixed(1), yu = +(TR.mid - up * TR.scl).toFixed(1);
        if (!cross) { cross = mk('line', { 'stroke': 'var(--text-muted)', 'stroke-width': '1', 'stroke-dasharray': '2 2', 'vector-effect': 'non-scaling-stroke' }); dg = mk('circle', { 'r': '2.8', 'fill': '#d4a642', 'stroke': 'var(--surface-2)', 'stroke-width': '0.8' }); du = mk('circle', { 'r': '2.8', 'fill': '#4884dc', 'stroke': 'var(--surface-2)', 'stroke-width': '0.8' }); }
        cross.setAttribute('x1', x); cross.setAttribute('y1', 2); cross.setAttribute('x2', x); cross.setAttribute('y2', 44); cross.style.display = '';
        dg.setAttribute('cx', x); dg.setAttribute('cy', yg); dg.style.display = '';
        du.setAttribute('cx', x); du.setAttribute('cy', yu); du.style.display = '';
      });
      sv.addEventListener('mouseleave', function () { tip.style.display = 'none'; if (cross) cross.style.display = 'none'; if (dg) dg.style.display = 'none'; if (du) du.style.display = 'none'; });
    }
    // ưu tiên #fredslot trong card quyết định (dashboard.js đặt sẵn); fallback div đầu trang
    var el = document.getElementById('fredslot') || document.getElementById('fredbias');
    if (!el) return;
    var TR = biasTrend(L);
    el.innerHTML = parts.join(' · ') + (TR ? TR.html : '');
    el.style.display = 'block';
    if (TR) hookHover(el, TR);
  }).catch(function () {});
})();
</script>

<script>/* pooldir dashboard renderer — doc window.GC_DATA, render vao #pooldir-root.
   Standalone/offline: dung CSS var (dinh nghia trong template) + glyph Unicode (khong CDN icon). */
(function () {
  function clampPct(x) { return Math.max(0, Math.min(100, x * 100)); }
  function f(x, n) { return Number(x).toFixed(n); }
  function arrow(d) { return d > 0 ? '\u2191' : (d < 0 ? '\u2193' : '\u00b7'); }
  function dirColor(d) { return d > 0 ? 'var(--text-success)' : (d < 0 ? 'var(--text-danger)' : 'var(--text-muted)'); }

  function render(d) {
    var root = document.getElementById('pooldir-root');
    if (!root || !d) return;
    var take = d.verdict === 'TAKE';
    var isFade = d.verdict === 'FADE';
    // verdict SKIP co 3 ly do khac nhau -> nhan/mau/ket luan phai phan biet:
    //   (a) M30 chan + nen chua dong (forming) nhung P du gate -> CHO, khong phai skip vi P
    //   (b) M30 chan vi keo hong (death/SL) -> HUY
    //   (c) P_follow that su duoi gate -> SKIP
    var _ib = d.intrabar || null;
    var _blk = !!(_ib && _ib.blocked), _frm = !!(_ib && _ib.forming);
    var _pf = d.pfollow || {};
    var _pp = _pf.primary, _gate = _pf.take != null ? _pf.take : 0.4;
    var _fadeable = _pf.fade_gate != null && _pp != null && _pp < _pf.fade_gate;
    var _pEnough = _pp != null && (_pp >= _gate || _fadeable);
    var vbg, vbd, vtx, vlabel, glyph;
    if (take) { vbg = 'var(--bg-success)'; vbd = 'var(--border-success)'; vtx = 'var(--text-success)'; vlabel = 'Take \u2014 v\u00e0o l\u1ec7nh'; glyph = '\u25b6'; }
    else if (isFade) { vbg = 'var(--bg-success)'; vbd = 'var(--border-success)'; vtx = 'var(--text-success)'; vlabel = 'Fade \u2014 v\u00e0o NG\u01af\u1ee2C displacement'; glyph = '\u21c4'; }
    else if (_blk && _frm && _pEnough) { vbg = 'var(--bg-warning)'; vbd = 'var(--border-warning)'; vtx = 'var(--text-warning)'; vlabel = 'Ch\u1edd \u2014 n\u1ebfn H4 ch\u01b0a \u0111\u00f3ng'; glyph = '\u23f8'; }
    else if (_blk && !_frm) { vbg = 'var(--bg-danger)'; vbd = 'var(--border-danger)'; vtx = 'var(--text-danger)'; vlabel = 'H\u1ee7y \u2014 k\u00e8o h\u1ecfng (M30)'; glyph = '\u2715'; }
    else { vbg = 'var(--bg-warning)'; vbd = 'var(--border-warning)'; vtx = 'var(--text-warning)'; vlabel = 'Skip \u2014 kh\u00f4ng v\u00e0o'; glyph = '\u23f8'; }

    var sd = d.side_dir;
    var sName = sd > 0 ? 'Long' : 'Short';
    var sColor = sd > 0 ? 'var(--text-success)' : 'var(--text-danger)';

    var ch = d.chain || {};
    var disp = d.disp || {};
    var ctx = d.context || {};
    var corr = ctx.kind === 'CORRELATE';
    var ctxName = ctx.kind === 'DIVERGE' ? 'diverge' : (ctx.kind === 'CORRELATE' ? 'correlate' : 'trung t\u00ednh');
    var ctxKind = ctx.kind === 'DIVERGE' ? 'reversal' : (ctx.kind === 'CORRELATE' ? 'continuation' : '');
    var ctxColor = ctx.kind === 'DIVERGE' ? 'var(--text-success)' : 'var(--text-warning)';
    var basePct = ctx.base_win != null ? Math.round(ctx.base_win * 100) : null;

    var pf = d.pfollow || {};
    var pp = pf.primary, gate = pf.take != null ? pf.take : 0.6;
    var pfFill = pp >= gate ? 'var(--text-success)' : 'var(--text-warning)';

    var ev = d.ev;
    var evColor = ev >= 0 ? 'var(--text-success)' : 'var(--text-danger)';

    var bins = d.ev_bins || [];
    var maxabs = 0; bins.forEach(function (b) { if (Math.abs(b.ev) > maxabs) maxabs = Math.abs(b.ev); });
    if (maxabs === 0) maxabs = 1;

    var dr = d.dr || {};
    var plan = d.plan || {};
    var st = d.stats || {};

    // ===== TIN TUC / LICH KINH TE (Phan A — chi HIEN THI, KHONG vao model) =====
    // moi event: {ts (epoch ms UTC), when (chuoi hien thi ET), title, impact, forecast, previous, actual}
    var news = d.news || null;
    var newsEvents = (news && news.events) ? news.events.slice().sort(function (a, b) { return a.ts - b.ts; }) : [];
    var _nowMs = Date.now();
    function newsCountdown(ts) {
      var am = Math.abs(ts - _nowMs);
      var h = Math.floor(am / 3600000), mnt = Math.floor((am % 3600000) / 60000);
      var txt = h >= 24 ? (Math.floor(h / 24) + 'n' + (h % 24 ? ' ' + (h % 24) + 'h' : '')) : (h >= 1 ? (h + 'h' + (mnt ? ' ' + mnt + 'p' : '')) : (mnt + 'p'));
      return { past: (ts - _nowMs) < 0, txt: txt, hours: am / 3600000 };

      H.push('<div style="width:52px;font-size:11px;color:' + labCol + ';font-variant-numeric:tabular-nums;text-align:right;">' + lab + '</div>');
      H.push('<div style="flex:1;position:relative;height:16px;"><div style="position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--border-strong);"></div>');
      if (pos) H.push('<div style="position:absolute;left:50%;top:3px;height:10px;width:' + w + '%;background:' + barCol + ';border-radius:0 3px 3px 0;"></div>');
      else H.push('<div style="position:absolute;right:50%;top:3px;height:10px;width:' + w + '%;background:' + barCol + ';border-radius:3px 0 0 3px;"></div>');
      H.push('</div><div style="width:46px;font-size:11px;color:' + valShow + ';font-variant-numeric:tabular-nums;">' + (b.ev >= 0 ? '+' : '\u2212') + f(Math.abs(b.ev), 2) + '</div></div>');
    });
    H.push('<div style="font-size:11px;color:var(--text-muted);margin-top:6px;">\u00f4 xanh = bin hi\u1ec7n t\u1ea1i \u00b7 v\u00f9ng take khi P_follow \u2265' + f(gate, 1) + '</div></div>');

    // DR / structure
    H.push('<div style="background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:14px;">');
    H.push('<div style="display:flex;align-items:center;justify-content:space-between;font-size:13px;margin-bottom:10px;"><span style="color:var(--text-secondary);">Trigger</span><span style="color:var(--text-primary);">' + disp.type + ' ' + (disp.dir < 0 ? 'down' : 'up') + '-displacement \u00b7 ' + (disp.date ? disp.date + ' \u00b7 ' : '') + disp.bars_ago + ' n\u1ebfn tr\u01b0\u1edbc</span></div>');
    H.push('<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:6px;font-variant-numeric:tabular-nums;">');
    H.push('<span style="color:var(--text-secondary);">SSL ' + f(dr.ssl, 1) + ' <span style="color:var(--text-success);">\u2212' + f(dr.dssl_atr, 1) + ' ATR \u2193target</span></span>');
    H.push('<span style="color:var(--text-secondary);">BSL ' + f(dr.bsl, 1) + ' <span style="color:var(--text-danger);">+' + f(dr.dbsl_atr, 1) + ' ATR</span></span></div>');
    H.push('<div style="position:relative;height:8px;background:var(--surface-0);border:0.5px solid var(--border);border-radius:999px;">');
    if (dr.tp_pct != null) H.push('<div style="position:absolute;left:' + clampPct(dr.tp_pct) + '%;top:-4px;bottom:-4px;width:2px;background:var(--text-success);"></div>');
    if (dr.sl_pct != null) H.push('<div style="position:absolute;left:' + clampPct(dr.sl_pct) + '%;top:-4px;bottom:-4px;width:2px;background:var(--text-danger);"></div>');
    H.push('<div style="position:absolute;left:' + clampPct(dr.price_pct) + '%;top:50%;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;background:var(--text-accent);border:2px solid var(--surface-2);"></div></div>');
    H.push('<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);margin-top:5px;"><span style="color:var(--text-success);">| TP ' + Math.round(clampPct(dr.tp_pct)) + '%</span><span style="color:var(--text-accent);">\u25cf gi\u00e1 ' + Math.round(clampPct(dr.price_pct)) + '%</span><span style="color:var(--text-danger);">SL ' + Math.round(clampPct(dr.sl_pct)) + '% |</span></div>');
    H.push('<div style="font-size:11px;color:var(--text-muted);margin-top:6px;">c\u00f2n ' + f(dr.dssl_atr, 1) + ' ATR room xu\u1ed1ng SSL \u00b7 kh\u00e1ng c\u1ef1 BSL ngay tr\u00ean (' + f(dr.dbsl_atr, 1) + ' ATR) \u2014 TP 2ATR d\u1eebng tr\u01b0\u1edbc pool</div>');
    H.push('</div>');

    // levels
    H.push('<div style="background:var(--surface-1);border-radius:12px;padding:12px 14px;margin-bottom:14px;">');
    H.push('<div style="font-size:12px;color:var(--text-secondary);margin-bottom:8px;">Levels ' + (take ? '\u00b7 v\u00e0o l\u1ec7nh' : 'tham kh\u1ea3o (v\u00e0o khi P_follow \u2265' + f(gate, 2) + ')') + ' \u00b7 R:R ' + (plan.rr || '2:1') + '</div>');
    H.push('<div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;text-align:center;">');
    H.push('<div><div style="font-size:11px;color:var(--text-muted);">Entry</div><div style="font-size:15px;font-weight:500;font-variant-numeric:tabular-nums;">' + f(plan.entry, 1) + '</div></div>');
    H.push('<div><div style="font-size:11px;color:var(--text-muted);">TP +2ATR</div><div style="font-size:15px;font-weight:500;color:var(--text-success);font-variant-numeric:tabular-nums;">' + f(plan.tp, 1) + '</div></div>');
    H.push('<div><div style="font-size:11px;color:var(--text-muted);">SL \u22121ATR</div><div style="font-size:15px;font-weight:500;color:var(--text-danger);font-variant-numeric:tabular-nums;">' + f(plan.sl, 1) + '</div></div>');
    H.push('</div></div>');

    // (card Chain + Ladder rieng da GOP vao card quyet dinh hop nhat o tren)

    // --- TONG HOP: tat ca displacement gan day + P_follow ---
    var cands = d.cands || [];
    if (cands.length) {
      H.push('<div style="margin-top:14px;padding-top:10px;border-top:0.5px solid var(--border);">');
      // cot gia = close nen displacement (c.px, predict_dir ghi tu 17/07/2026);
      // JSON cu chua co px -> an ca cot, khong de o trong
      var hasPx = cands.some(function (c) { return c.px != null; });
      H.push('<div style="font-size:12px;color:var(--text-secondary);margin-bottom:8px;">Tổng hợp ' + cands.length + ' displacement gần đây (mới nhất trước) · ★ = P_follow ≥ ' + f(gate, 2) + (hasPx ? ' · giá = close nến disp' : '') + '</div>');
      cands.forEach(function (c) {
        var isTake = c.take;
        var pfCol = isTake ? 'var(--text-success)' : 'var(--text-muted)';
        var w = clampPct(c.pf);
        H.push('<div style="display:flex;align-items:center;gap:8px;font-size:12px;padding:2.5px 0;">');
        H.push('<span style="width:30px;color:var(--text-muted);font-variant-numeric:tabular-nums;">d-' + c.bars_ago + '</span>');
        H.push('<span style="width:74px;color:var(--text-muted);font-size:11px;font-variant-numeric:tabular-nums;">' + (c.date || '') + '</span>');
        H.push('<span style="width:36px;font-weight:600;">' + c.type + '</span>');
        H.push('<span style="width:14px;color:' + dirColor(c.dir) + ';">' + arrow(c.dir) + '</span>');
        if (hasPx) H.push('<span style="width:52px;text-align:right;color:var(--text-secondary);font-variant-numeric:tabular-nums;">' + (c.px != null ? f(c.px, 1) : '') + '</span>');
        H.push('<div style="flex:1;height:6px;background:var(--surface-1);border-radius:3px;overflow:hidden;"><div style="width:' + w + '%;height:100%;background:' + pfCol + ';"></div></div>');
        H.push('<span style="width:42px;text-align:right;font-variant-numeric:tabular-nums;color:' + pfCol + ';">' + f(c.pf, 3) + '</span>');
        H.push('<span style="width:16px;color:var(--text-success);">' + (isTake ? '★' : '') + '</span>');
        H.push('</div>');
      });
      H.push('</div>');
    }

    // ===== TIN TUC QUAN TRONG \u00b7 lich kinh te (chi hien thi tham khao) =====
    if (news && newsEvents.length) {
      var _rows = _newsUpc.slice(0, 6);
      var _recent = newsEvents.filter(function (e) { var c = newsCountdown(e.ts); return c.past && c.hours <= 12; })
                              .sort(function (a, b) { return b.ts - a.ts; });
      H.push('<div style="background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;padding:13px 15px;margin-bottom:14px;">');
      H.push('<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;gap:8px;">'
        + '<span style="font-size:12px;color:var(--text-secondary);font-weight:500;">Tin t\u1ee9c quan tr\u1ecdng \u00b7 l\u1ecbch kinh t\u1ebf</span>'
        + '<span style="font-size:10px;color:var(--text-muted);white-space:nowrap;">' + (news.source || '') + '</span></div>');
      if (!_rows.length && !_recent.length) {
        H.push('<div style="font-size:11px;color:var(--text-muted);padding:4px 0;">Kh\u00f4ng c\u00f3 s\u1ef1 ki\u1ec7n high-impact s\u1eafp t\u1edbi.</div>');
      }
      var newsRow = function (e, past) {
        var im = impactMeta(e.impact); var cd = newsCountdown(e.ts);
        H.push('<div style="display:flex;align-items:center;gap:9px;padding:6px 0;border-top:0.5px solid var(--border);">');
        H.push('<span style="width:58px;flex-shrink:0;font-size:10px;text-align:right;font-variant-numeric:tabular-nums;color:' + (past ? 'var(--text-muted)' : im.tx) + ';">'
          + (past ? '\u0111\u00e3 ra' : ('trong ' + cd.txt)) + '</span>');
        H.push('<span style="flex-shrink:0;color:' + im.tx + ';font-size:11px;">' + im.dot + '</span>');
        H.push('<div style="flex:1;min-width:0;"><div style="font-size:12px;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + e.title + '</div>'
          + '<div style="font-size:10px;color:var(--text-muted);font-variant-numeric:tabular-nums;">' + e.when
          + (e.forecast ? (' \u00b7 d\u1ef1 b\u00e1o ' + e.forecast) : '')
          + ((past && e.actual) ? (' \u00b7 <b style="color:' + im.tx + ';">th\u1ef1c ' + e.actual + '</b>') : '')
          + (e.previous ? (' \u00b7 tr\u01b0\u1edbc ' + e.previous) : '') + '</div></div>');
        H.push('</div>');
      };
      _recent.forEach(function (e) { newsRow(e, true); });
      _rows.forEach(function (e) { newsRow(e, false); });
      H.push('<div style="font-size:10px;color:var(--text-muted);margin-top:8px;line-height:1.5;border-top:0.5px solid var(--border);padding-top:8px;">Ch\u1ec9 tham kh\u1ea3o \u2014 KH\u00d4NG \u0111\u01b0a v\u00e0o model. \u0110\u1ebfm ng\u01b0\u1ee3c c\u1eadp nh\u1eadt khi m\u1edf trang \u00b7 danh s\u00e1ch l\u00e0m m\u1edbi m\u1ed7i l\u1ea7n ch\u1ea1y H4' + (news.asof ? (' (' + news.asof + ')') : '') + '.</div>');
      H.push('</div>');
    }

    // footer
    H.push('<div style="font-size:11px;color:var(--text-muted);line-height:1.6;border-top:0.5px solid var(--border);padding-top:10px;">H\u01b0\u1edbng = displacement; P_follow = P(l\u1ec7nh 2:1 th\u1eafng, entry t\u1ea1i n\u1ebfn ph\u00e1t hi\u1ec7n). Take \u2265' + f(gate, 2) + ' OOS: win ' + Math.round(st.take_wr * 100) + '% \u00b7 EV +' + f(st.take_mean, 2) + 'R/l\u1ec7nh \u00b7 WF-AUC ' + f(st.wf_auc, 3) + '.</div>');

    H.push('</div>');
    root.innerHTML = H.join('');
  }

  window.renderPooldir = render;
  if (window.GC_DATA) render(window.GC_DATA);
})();
</script>
</body>
</html>
