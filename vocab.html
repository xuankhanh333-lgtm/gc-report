<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>📖 Từ mới — English vocab</title>
<style>
:root{--bg:#0e1117;--card:#161b22;--card2:#1c2330;--line:#2d333b;--ink:#e6edf3;--ink2:#8b949e;--grn:#3fb950;--red:#f85149;--yel:#d29922;--blu:#58a6ff;--pur:#bc8cff}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font:15px/1.5 "Segoe UI",system-ui,sans-serif;padding:14px;max-width:860px;margin:0 auto}
h1{font-size:19px;margin-bottom:2px}
.sub{color:var(--ink2);font-size:12.5px;margin-bottom:12px}
.statbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.chip{background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px 11px;font-size:12.5px;color:var(--ink2)}
.chip b{color:var(--ink)}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.tab{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:6px 14px;font-size:13.5px;color:var(--ink2);cursor:pointer}
.tab[aria-pressed="true"]{background:var(--card2);color:var(--ink);border-color:var(--blu)}
.tab .bdg{background:var(--red);color:#fff;border-radius:999px;padding:0 6px;font-size:11px;margin-left:4px}
select{background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:5px 8px;font-size:13px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px}
.card.done{opacity:.45}
.wrow{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.w{font-size:21px;font-weight:700}
.ipa{color:var(--blu);font-size:14px}
.pos{background:var(--card2);border-radius:6px;padding:1px 7px;font-size:11.5px;color:var(--pur)}
.top{background:var(--card2);border-radius:6px;padding:1px 7px;font-size:11.5px;color:var(--yel)}
.lv{border-radius:6px;padding:1px 7px;font-size:11.5px;cursor:help}
.lvA{background:#0d2818;color:var(--grn)}.lvB{background:#0d1f33;color:var(--blu)}.lvC{background:#241333;color:var(--pur)}
.spk{cursor:pointer;font-size:16px;background:none;border:none;color:var(--blu)}
.mean{margin-top:8px;display:none}
.mean.open{display:block}
.vn{font-size:15.5px;color:var(--grn);font-weight:600}
.ex{margin-top:4px;font-size:13.5px}
.exvn{color:var(--ink2);font-size:12.5px;font-style:italic}
.btns{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}
button.b{border:1px solid var(--line);border-radius:8px;padding:6px 14px;font-size:13px;cursor:pointer;background:var(--card2);color:var(--ink)}
button.b.show{border-color:var(--blu);color:var(--blu)}
button.b.ok{border-color:var(--grn);color:var(--grn)}
button.b.no{border-color:var(--red);color:var(--red)}
.boxchip{font-size:11px;color:var(--ink2);margin-left:auto}
.empty{color:var(--ink2);padding:30px 10px;text-align:center}
/* quiz */
.qword{font-size:26px;font-weight:700;text-align:center;margin:18px 0 4px}
.qipa{text-align:center;color:var(--blu);margin-bottom:14px}
.qopt{display:block;width:100%;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin-bottom:8px;font-size:14.5px;color:var(--ink);cursor:pointer}
.qopt.right{border-color:var(--grn);background:#12261a}
.qopt.wrong{border-color:var(--red);background:#2b1618}
.qprog{color:var(--ink2);font-size:12.5px;text-align:center;margin-bottom:6px}
/* all table */
input[type=search]{background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:13.5px;width:220px;margin-bottom:10px}
table{border-collapse:collapse;width:100%;font-size:13px}
th,td{padding:5px 8px;border-bottom:1px solid var(--line);text-align:left}
th{color:var(--ink2);font-weight:600;font-size:12px}
.lvl{border-radius:6px;padding:0 7px;font-size:11px}
.l0{background:#21262d;color:var(--ink2)}.l1{background:#3b2300;color:var(--yel)}.l2{background:#0d2818;color:var(--grn)}
footer{color:var(--ink2);font-size:11.5px;margin-top:18px;text-align:center}
</style>
</head>
<body>
<h1>📖 Từ mới mỗi ngày</h1>
<div class="sub">Flashcard tiếng Anh — tài chính · công việc · giao tiếp. Ôn tập ngắt quãng (Leitner): nhớ → giãn cách 1→2→4→7→14→30→60 ngày.</div>
<div class="statbar" id="stats"></div>
<div class="tabs">
  <button class="tab" data-t="today" aria-pressed="true">Hôm nay</button>
  <button class="tab" data-t="review" aria-pressed="false">Ôn tập <span class="bdg" id="duebdg" style="display:none"></span></button>
  <button class="tab" data-t="quiz" aria-pressed="false">Trắc nghiệm</button>
  <button class="tab" data-t="ipa" aria-pressed="false">Phiên âm</button>
  <button class="tab" data-t="gram" aria-pressed="false">Ngữ pháp</button>
  <button class="tab" data-t="all" aria-pressed="false">Tất cả</button>
  <select id="perday" title="Số từ mới mỗi ngày">
    <option value="5">5 từ/ngày</option>
    <option value="10" selected>10 từ/ngày</option>
    <option value="15">15 từ/ngày</option>
  </select>
</div>
<div id="main"></div>
<footer>Tiến độ lưu trong trình duyệt (localStorage) · 🔊 dùng giọng đọc hệ thống · muốn thêm từ mới cứ bảo Claude</footer>

// ===== state =====
const LSK='envocab1';
const INT=[1,1,2,4,7,14,30,60]; // ngày chờ theo box (index = box)
const TOPIC={fin:'tài chính',work:'công việc',daily:'giao tiếp'};
const LVI={A1:'IELTS ~2-3 · từ nền tảng',A2:'IELTS ~3-4 · rất phổ biến',B1:'IELTS ~4-5 · phổ biến',B2:'IELTS ~5.5-6.5 · trung cao',C1:'IELTS ~7-8 · nâng cao/chuyên ngành',C2:'IELTS ~8.5-9 · hiếm gặp'};
function lvTag(l){if(!l)return'';return '<span class="lv lv'+l[0]+'" title="CEFR '+l+' — '+(LVI[l]||'')+'">'+l+'</span>'}
function lvChip(e){return lvTag(e[7])}
function load(){try{return JSON.parse(localStorage.getItem(LSK))||{}}catch(e){return{}}}
function save(){localStorage.setItem(LSK,JSON.stringify(S))}
const S=load(); S.prog=S.prog||{}; S.streak=S.streak||{last:'',n:0}; S.size=S.size||10;
function ymd(d){const p=n=>String(n).padStart(2,'0');return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())}
const TODAY=ymd(new Date());
function addDays(s,n){const d=new Date(s+'T00:00:00');d.setDate(d.getDate()+n);return ymd(d)}
const byW={}; BANK.forEach(e=>{byW[e[0]]=e});
function dueList(){return BANK.filter(e=>{const p=S.prog[e[0]];return p&&p.due<=TODAY}).map(e=>e[0])}
function todayList(){
  if(S.today&&S.today.d===TODAY) return S.today.list.filter(w=>byW[w]);
  // tron deu 3 chu de: fin -> work -> daily -> fin...
  const un={};
  BANK.forEach(e=>{if(!S.prog[e[0]])(un[e[6]]=un[e[6]]||[]).push(e[0])});
  const order=['fin','work','daily'], list=[];
  let i=0;
  while(list.length<S.size && Object.values(un).some(a=>a.length)){
    const a=un[order[i%order.length]]; i++;
    if(a&&a.length) list.push(a.shift());
  }
  S.today={d:TODAY,list}; save(); return list;
}
function bumpStreak(){
  if(S.streak.last===TODAY) return;
  S.streak.n=(S.streak.last===addDays(TODAY,-1))?S.streak.n+1:1;
  S.streak.last=TODAY; save();
}
function grade(w,ok){
  const p=S.prog[w]||{b:0,due:TODAY,n:0};
  p.n++;
  if(ok){p.b=Math.min(p.b+1,INT.length-1);p.due=addDays(TODAY,INT[p.b]);}
  else{p.b=1;p.due=addDays(TODAY,1);}
  S.prog[w]=p; bumpStreak(); save(); paintStats();
}
function say(t){try{const u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=0.9;speechSynthesis.cancel();speechSynthesis.speak(u)}catch(e){}}
window.__say=say;
// ===== render =====
const $=s=>document.querySelector(s);
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')}
function paintStats(){
  const learned=Object.keys(S.prog).length, due=dueList().length;
  $('#stats').innerHTML=
    '<span class="chip">Đã học <b>'+learned+'</b>/'+BANK.length+'</span>'+
    '<span class="chip">Đến hạn ôn <b>'+due+'</b></span>'+
    '<span class="chip">🔥 chuỗi <b>'+(S.streak.n||0)+'</b> ngày</span>';
  const b=$('#duebdg'); if(due>0){b.style.display='';b.textContent=due}else b.style.display='none';
}
function cardHTML(w,i,mode){
  const e=byW[w]; if(!e)return'';
  const p=S.prog[w];
  return '<div class="card" id="c'+mode+i+'">'+
    '<div class="wrow"><span class="w">'+esc(e[0])+'</span><span class="ipa">/'+esc(e[1])+'/</span>'+
    '<button class="spk" onclick="__say('+JSON.stringify(e[0])+')" title="Nghe phát âm">🔊</button>'+
    '<span class="pos">'+esc(e[2])+'</span><span class="top">'+(TOPIC[e[6]]||e[6])+'</span>'+lvChip(e)+
    (p?'<span class="boxchip">hộp '+p.b+' · ôn '+p.due+'</span>':'')+
    '</div>'+
    '<div class="mean" id="m'+mode+i+'"><div class="vn">'+esc(e[3])+'</div>'+
    '<div class="ex">“'+esc(e[4])+'”</div><div class="exvn">'+esc(e[5])+'</div>'+
    (e[8]?'<div class="ex" style="color:var(--yel)">▸ cụm hay dùng: '+esc(e[8])+'</div>':'')+'</div>'+
    '<div class="btns" id="b'+mode+i+'">'+
    '<button class="b show" onclick="__reveal(\''+mode+'\','+i+')">Hiện nghĩa</button>'+
    '</div></div>';
}
window.__reveal=function(mode,i){
  $('#m'+mode+i).classList.add('open');
  $('#b'+mode+i).innerHTML=
    '<button class="b no" onclick="__grade(\''+mode+'\','+i+',0)">✗ Chưa nhớ</button>'+
    '<button class="b ok" onclick="__grade(\''+mode+'\','+i+',1)">✓ Nhớ rồi</button>';
};
let CUR=[];
window.__grade=function(mode,i,ok){
  grade(CUR[i],!!ok);
  const c=$('#c'+mode+i); c.classList.add('done');
  $('#b'+mode+i).innerHTML='<span style="color:'+(ok?'var(--grn)':'var(--red)')+';font-size:13px">'+(ok?'✓ hẹn ôn sau '+INT[S.prog[CUR[i]].b]+' ngày':'✗ mai ôn lại')+'</span>';
};
function viewToday(){
  CUR=todayList();
  if(!CUR.length) return '<div class="empty">🎉 Đã học hết kho từ! Bảo Claude nạp thêm từ mới.</div>';
  return '<div class="sub">'+CUR.length+' từ mới hôm nay — đọc, nghe 🔊, tự đoán nghĩa rồi bấm <b>Hiện nghĩa</b> và tự chấm.</div>'+
    CUR.map((w,i)=>cardHTML(w,i,'t')).join('');
}
function viewReview(){
  CUR=dueList();
  if(!CUR.length) return '<div class="empty">Không có từ nào đến hạn ôn hôm nay ✓</div>';
  return '<div class="sub">'+CUR.length+' từ đến hạn ôn — nhớ đúng thì khoảng cách ôn sẽ giãn dần ra.</div>'+
    CUR.map((w,i)=>cardHTML(w,i,'r')).join('');
}
// ===== quiz =====
let QZ=null;
function pick(arr,n){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a.slice(0,n)}
function startQuiz(){
  const learned=Object.keys(S.prog).filter(w=>byW[w]);
  const pool=learned.length>=10?learned:BANK.map(e=>e[0]);
  QZ={qs:pick(pool,Math.min(10,pool.length)),i:0,ok:0};
  paintQuiz();
}
function paintQuiz(){
  const m=$('#main');
  if(QZ.i>=QZ.qs.length){
    m.innerHTML='<div class="empty" style="font-size:17px">Kết quả: <b style="color:var(--grn)">'+QZ.ok+'/'+QZ.qs.length+'</b> câu đúng'+
      '<div style="margin-top:14px"><button class="b show" onclick="__quiz()">Chơi lại</button></div></div>';
    return;
  }
  const w=QZ.qs[QZ.i], e=byW[w];
  const wrong=pick(BANK.filter(x=>x[0]!==w).map(x=>x[3]),3);
  const opts=pick([e[3],...wrong],4);
  m.innerHTML='<div class="qprog">Câu '+(QZ.i+1)+'/'+QZ.qs.length+' · đúng '+QZ.ok+'</div>'+
    '<div class="qword">'+esc(w)+' <button class="spk" onclick="__say('+JSON.stringify(w)+')">🔊</button></div>'+
    '<div class="qipa">/'+esc(e[1])+'/ '+lvChip(e)+'</div>'+
    opts.map(o=>'<button class="qopt" data-v="'+esc(o)+'">'+esc(o)+'</button>').join('');
  m.querySelectorAll('.qopt').forEach(b=>b.addEventListener('click',()=>{
    const right=b.dataset.v===e[3];
    m.querySelectorAll('.qopt').forEach(x=>{
      if(x.dataset.v===e[3])x.classList.add('right');
      else if(x===b)x.classList.add('wrong');
      x.disabled=true;
    });
    if(right)QZ.ok++;
    else{const p=S.prog[w];if(p){p.b=1;p.due=TODAY;save();}}
    setTimeout(()=>{QZ.i++;paintQuiz();paintStats()},900);
  }));
}
window.__quiz=startQuiz;

  else if(t==='review')m.innerHTML=viewReview();
  else if(t==='quiz')startQuiz();
  else if(t==='ipa')m.innerHTML=viewIPA();
  else if(t==='gram')m.innerHTML=viewGram();
  else{m.innerHTML=viewAll();paintAll('');$('#qs').addEventListener('input',e=>paintAll(e.target.value));}
}
document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>show(b.dataset.t)));
const pd=$('#perday'); pd.value=String(S.size);
pd.addEventListener('change',()=>{S.size=parseInt(pd.value,10)||10;delete S.today;save();show('today');paintStats();});
paintStats(); show('today');
</script>
</body>
